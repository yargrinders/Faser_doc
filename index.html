<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GF-Anschluss — Schneider Winter Magdeburg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <img src="img/S_W.png" alt="Schneider Winter Logo" class="brand-logo" onerror="this.style.display='none'">
        <div class="brand-text">
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" id="btn-print" type="button">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15">
            <path d="M5 7V2h10v5M5 15H3a1 1 0 01-1-1V9a1 1 0 011-1h14a1 1 0 011 1v5a1 1 0 01-1 1h-2"/>
            <rect x="5" y="11" width="10" height="7" rx="1"/>
            <circle cx="16" cy="9.5" r=".8" fill="currentColor" stroke="none"/>
          </svg>
          Drucken
        </button>
        <button class="btn btn-primary" id="btn-pdf" type="button">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15">
            <path d="M11.5 2H5a1 1 0 00-1 1v14a1 1 0 001 1h10a1 1 0 001-1V7.5L11.5 2z"/>
            <path d="M11 2v6h6M10 10v5M8 13l2 2 2-2"/>
          </svg>
          PDF speichern
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <main class="editor">
      <div class="city-row">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" width="14" height="14" style="color:var(--accent);flex-shrink:0">
          <path d="M8 1.5C5.52 1.5 3.5 3.52 3.5 6c0 3.75 4.5 8.5 4.5 8.5S12.5 9.75 12.5 6c0-2.48-2.02-4.5-4.5-4.5z"/>
          <circle cx="8" cy="6" r="1.5"/>
        </svg>
        <label for="global-city" class="city-label">Stadt</label>
        <input id="global-city" class="city-input" type="text" placeholder="z. B. Magdeburg" autocomplete="off"/>
        <span class="city-hint">Für alle QR-Codes</span>
      </div>
      <div class="city-error" id="city-error"></div>

      <div class="multi-city-toggle-row">
        <label class="multi-city-label" for="multi-city-toggle">
          <div class="multi-city-switch">
            <input type="checkbox" id="multi-city-toggle">
            <span class="multi-city-slider"></span>
          </div>
          <span class="multi-city-text">Multi-Stadt</span>
          <span class="multi-city-hint">Verschiedene Städte pro Terminal</span>
        </label>
      </div>

      <div id="terms-list"></div>

      <button class="btn-add" id="btn-add-term" type="button">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
          <circle cx="8" cy="8" r="6.5"/><line x1="8" y1="5" x2="8" y2="11"/><line x1="5" y1="8" x2="11" y2="8"/>
        </svg>
        Neues Terminal hinzufügen
      </button>
    </main>

    <aside class="preview-panel">
      <div class="preview-top">
        <span class="preview-label">Vorschau A4</span>
        <span class="preview-count" id="preview-count">0 Termine</span>
      </div>
      <div class="preview-body" id="preview-pages"></div>
    </aside>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="js/modules/logics.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
